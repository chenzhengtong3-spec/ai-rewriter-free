<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Free AI Paraphraser</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial}
body{max-width:800px;margin:40px auto;padding:0 20px;background:#f9f9f9}
.box{background:white;padding:24px;border-radius:12px;box-shadow:0 2px 10px #00000010}
textarea{width:100%;height:180px;padding:12px;margin:10px 0;border:1px solid #ddd;border-radius:8px}
button{background:#007bff;color:white;border:none;padding:12px 24px;border-radius:8px;cursor:pointer;font-size:16px}
.result{margin-top:20px;padding:16px;background:#f1f1f1;border-radius:8px;min-height:100px;white-space:pre-wrap}
.tg{margin-top:20px;text-align:center;color:#333}
.tg a{color:#007bff;font-weight:bold}
.limit{color:#666;font-size:14px;margin-bottom:10px}
</style>
</head>
<body>
<div class="box">
<h2>Free AI Paraphraser | Rewrite Text</h2>
<p class="limit">Free daily uses, no login needed</p>
<textarea id="input" placeholder="Paste your text here..."></textarea>
<button onclick="rewrite()">Paraphrase</button>
<div class="result" id="result"></div>
</div>
<div class="tg">
Unlimited use & API Key→Telegram: <a href=" " target="_blank">@sjjsnejje</a>
</div>

<script>
let count = 0;
async function rewrite() {
    if(count >= 3) {
        document.getElementById("result").innerText = "Daily limit reached. DM Telegram for unlimited.";
        return;
    }
    let text = document.getElementById("input").value.trim();
    if(!text) return alert("Enter text");
    const resBox = document.getElementById("result");
    resBox.innerText = "Processing...";

    try {
        const response = await fetch("https://api.r12.ink/v1/chat/completions", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer sk-9tsglenu0kZnBXCKYgiK90SLV9318J_6Q8nL2Ju5wgw"
            },
            body: JSON.stringify({
                model: "openclaw-qwen3-14b",
                messages: [{role:"user",content:"Paraphrase this text naturally: " + text}]
            })
        });
        const data = await response.json();
        resBox.innerText = data.choices?.[0]?.message?.content || "Error: " + JSON.stringify(data);
        count++;
    } catch (e) {
        resBox.innerText = "Error: " + e.message;
    }
}
</script>
</body>
</html>
